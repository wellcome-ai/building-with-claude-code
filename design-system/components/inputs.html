<!-- @dsCard group="Components" name="Inputs & amount field" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Split — Inputs</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: "Inter", system-ui, sans-serif; background: #f6f7f9; color: #14152b; padding: 40px; }
  .panel { max-width: 380px; display: flex; flex-direction: column; gap: 22px; }
  label { display: block; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #6b7280; margin-bottom: 8px; }
  .field { width: 100%; background: #fff; border: 1.5px solid #e6e8ec; border-radius: 12px; padding: 13px 14px; font-family: inherit; font-size: 15px; color: #14152b; }
  .field::placeholder { color: #9aa1ad; }
  .field.focus { border-color: #4f46e5; box-shadow: 0 0 0 4px rgba(79,70,229,0.12); outline: none; }
  .amount { display: flex; align-items: center; background: #fff; border: 1.5px solid #4f46e5; border-radius: 16px; padding: 14px 18px; box-shadow: 0 0 0 4px rgba(79,70,229,0.10); }
  .amount .cur { font-size: 28px; font-weight: 700; color: #9aa1ad; margin-right: 6px; }
  .amount input { border: 0; outline: 0; font-family: inherit; font-size: 36px; font-weight: 800; color: #14152b; width: 100%; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  .hint { font-size: 12px; color: #9aa1ad; margin-top: 6px; }
  .err { border-color: #e5484d; box-shadow: 0 0 0 4px rgba(229,72,77,0.12); }
  .errmsg { font-size: 12px; color: #e5484d; margin-top: 6px; font-weight: 500; }
</style>
</head>
<body>
  <div class="panel">
    <div>
      <label>Amount</label>
      <div class="amount"><span class="cur">$</span><input value="120.00" /></div>
      <div class="hint">Tap a number to start. Even split is applied automatically.</div>
    </div>
    <div>
      <label>Description</label>
      <input class="field focus" value="Dinner at Stokehouse" />
    </div>
    <div>
      <label>Group name</label>
      <input class="field" placeholder="e.g. Trip to Byron" />
    </div>
    <div>
      <label>New member</label>
      <input class="field err" value="" placeholder="Name" />
      <div class="errmsg">Add at least one other person to split with.</div>
    </div>
  </div>
</body>
</html>
