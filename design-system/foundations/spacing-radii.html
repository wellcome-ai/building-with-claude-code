<!-- @dsCard group="Spacing" name="Spacing, radii & elevation" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Split — Spacing</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: "Inter", system-ui, sans-serif; background: #f6f7f9; color: #14152b; padding: 40px; }
  h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; color: #6b7280; margin: 0 0 16px; font-weight: 600; }
  section { margin-bottom: 32px; }
  .scale { display: flex; align-items: flex-end; gap: 16px; }
  .unit { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: #4f46e5; border-radius: 4px; width: 28px; }
  .unit span { font-size: 11px; color: #6b7280; font-family: ui-monospace, monospace; }
  .radii { display: flex; gap: 16px; }
  .rad { width: 80px; height: 80px; background: #ecebfd; border: 1.5px solid #4f46e5; display: grid; place-items: end center; padding-bottom: 8px; font-size: 11px; color: #4338ca; font-family: ui-monospace, monospace; }
  .elev { display: flex; gap: 24px; }
  .card { width: 140px; height: 80px; background: #fff; border-radius: 12px; display: grid; place-items: center; font-size: 12px; color: #6b7280; }
  .e1 { box-shadow: 0 1px 2px rgba(20,21,43,0.04), 0 4px 16px rgba(20,21,43,0.06); }
  .e2 { box-shadow: 0 6px 20px rgba(79,70,229,0.35); }
</style>
</head>
<body>
  <section>
    <h2>Spacing scale (4px base)</h2>
    <div class="scale">
      <div class="unit"><div class="bar" style="height:4px"></div><span>4</span></div>
      <div class="unit"><div class="bar" style="height:8px"></div><span>8</span></div>
      <div class="unit"><div class="bar" style="height:12px"></div><span>12</span></div>
      <div class="unit"><div class="bar" style="height:16px"></div><span>16</span></div>
      <div class="unit"><div class="bar" style="height:24px"></div><span>24</span></div>
      <div class="unit"><div class="bar" style="height:32px"></div><span>32</span></div>
      <div class="unit"><div class="bar" style="height:48px"></div><span>48</span></div>
    </div>
  </section>
  <section>
    <h2>Radii</h2>
    <div class="radii">
      <div class="rad" style="border-radius:8px">8 · sm</div>
      <div class="rad" style="border-radius:12px">12 · md</div>
      <div class="rad" style="border-radius:16px">16 · lg</div>
      <div class="rad" style="border-radius:999px;width:80px">pill</div>
    </div>
  </section>
  <section>
    <h2>Elevation</h2>
    <div class="elev">
      <div class="card e1">card</div>
      <div class="card e2" style="background:#4f46e5;color:#fff">fab</div>
    </div>
  </section>
</body>
</html>
